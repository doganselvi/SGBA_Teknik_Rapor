
<style>
  @keyframes draw { to { stroke-dashoffset: 0; } }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.15)} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  .step-dot { width:8px;height:8px;border-radius:50%;background:var(--color-border-secondary);flex-shrink:0;transition:background .3s; }
  .step-dot.active { background:#1DB873; animation: pulse .8s ease-in-out infinite; }
  .step-dot.done { background:#1DB873; animation:none; }
  #status-text { font-size:13px;color:var(--color-text-secondary);text-align:center;min-height:20px;transition:opacity .3s; }
  #dtw-bar { transition:width .6s ease; }
  .label-fade { animation: fadeIn .4s ease; }
</style>

<div style="padding:1rem 0">
  <div style="max-width:480px;margin:0 auto">

    <!-- Gesture canvas -->
    <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:16px;margin-bottom:12px">
      <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:8px;text-align:center">Ana ekran · gesture çiziliyor (sıfır görsel iz)</div>
      <svg id="gesture-svg" width="100%" viewBox="0 0 320 200" style="display:block">
        <defs>
          <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </marker>
        </defs>
        <!-- Sahte uygulama ikonları (arka plan) -->
        <rect x="20" y="20" width="44" height="44" rx="12" fill="rgba(26,115,232,0.15)" stroke="rgba(26,115,232,0.2)" stroke-width="0.5"/>
        <rect x="80" y="20" width="44" height="44" rx="12" fill="rgba(52,168,83,0.15)" stroke="rgba(52,168,83,0.2)" stroke-width="0.5"/>
        <rect x="140" y="20" width="44" height="44" rx="12" fill="rgba(234,67,53,0.15)" stroke="rgba(234,67,53,0.2)" stroke-width="0.5"/>
        <rect x="200" y="20" width="44" height="44" rx="12" fill="rgba(251,188,4,0.15)" stroke="rgba(251,188,4,0.2)" stroke-width="0.5"/>
        <rect x="260" y="20" width="44" height="44" rx="12" fill="rgba(156,39,176,0.15)" stroke="rgba(156,39,176,0.2)" stroke-width="0.5"/>
        <rect x="20" y="80" width="44" height="44" rx="12" fill="rgba(0,150,136,0.15)" stroke="rgba(0,150,136,0.2)" stroke-width="0.5"/>
        <rect x="80" y="80" width="44" height="44" rx="12" fill="rgba(96,125,139,0.15)" stroke="rgba(96,125,139,0.2)" stroke-width="0.5"/>
        <rect x="140" y="80" width="44" height="44" rx="12" fill="rgba(255,87,34,0.15)" stroke="rgba(255,87,34,0.2)" stroke-width="0.5"/>
        <rect x="200" y="80" width="44" height="44" rx="12" fill="rgba(33,150,243,0.15)" stroke="rgba(33,150,243,0.2)" stroke-width="0.5"/>
        <rect x="260" y="80" width="44" height="44" rx="12" fill="rgba(76,175,80,0.15)" stroke="rgba(76,175,80,0.2)" stroke-width="0.5"/>

        <!-- Gesture path: Z harfi gibi -->
        <path id="gpath" d="M80 140 L240 140 L80 180 L240 180"
          fill="none" stroke="#1DB873" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
          stroke-dasharray="500" stroke-dashoffset="500"/>
        <!-- Parmak noktası -->
        <circle id="finger-dot" cx="80" cy="140" r="6" fill="#1DB873" opacity="0"/>
      </svg>
    </div>

    <!-- Adım göstergesi -->
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px">
      <div class="step-dot active" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
      <div class="step-dot" id="dot3"></div>
      <div class="step-dot" id="dot4"></div>
    </div>

    <div id="status-text">Kullanıcı ana ekranda gesture çiziyor...</div>

    <!-- DTW Eşleşme Barı -->
    <div style="margin:12px 0 8px">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-secondary);margin-bottom:4px">
        <span>DTW Benzerlik Skoru</span>
        <span id="dtw-pct">0%</span>
      </div>
      <div style="background:var(--color-background-secondary);border-radius:4px;height:6px;overflow:hidden;border:0.5px solid var(--color-border-tertiary)">
        <div id="dtw-bar" style="height:100%;width:0%;background:#1DB873;border-radius:4px"></div>
      </div>
    </div>

    <!-- Sonuç kutusu -->
    <div id="result-box" style="display:none;padding:10px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);font-size:12px;color:var(--color-text-primary);text-align:center"></div>

    <!-- Buton -->
    <div style="text-align:center;margin-top:14px">
      <button id="demo-btn" onclick="startDemo()" style="padding:8px 20px;font-size:13px">Demoyu Başlat ↗</button>
    </div>

  </div>
</div>

<script>
let running = false;
const steps = [
  { dot: 1, text: "Parmak hareketi başladı · X/Y koordinatlar dinleniyor...", dtw: 0 },
  { dot: 2, text: "Vektör haritası oluşturuluyor · hareket kaydediliyor...", dtw: 35 },
  { dot: 3, text: "DTW algoritması referans vektörle karşılaştırıyor...", dtw: 72 },
  { dot: 4, text: "Eşleşme %88 · Gizli Panel açılıyor!", dtw: 88 },
];

function setDot(active) {
  for (let i = 1; i <= 4; i++) {
    const d = document.getElementById('dot' + i);
    d.classList.remove('active','done');
    if (i < active) d.classList.add('done');
    if (i === active) d.classList.add('active');
  }
}

function startDemo() {
  if (running) return;
  running = true;
  const btn = document.getElementById('demo-btn');
  btn.disabled = true;
  btn.textContent = 'Çalışıyor...';

  const path = document.getElementById('gpath');
  const dot = document.getElementById('finger-dot');
  const status = document.getElementById('status-text');
  const bar = document.getElementById('dtw-bar');
  const pct = document.getElementById('dtw-pct');
  const result = document.getElementById('result-box');

  result.style.display = 'none';
  path.style.strokeDashoffset = '500';
  dot.style.opacity = '0';
  bar.style.width = '0%';
  pct.textContent = '0%';
  setDot(1);
  status.textContent = steps[0].text;

  setTimeout(() => {
    dot.style.opacity = '1';
    path.style.transition = 'stroke-dashoffset 1.4s ease';
    path.style.strokeDashoffset = '0';
    setDot(2);
    status.textContent = steps[1].text;
    bar.style.width = steps[1].dtw + '%';
    pct.textContent = steps[1].dtw + '%';
  }, 400);

  setTimeout(() => {
    setDot(3);
    status.textContent = steps[2].text;
    bar.style.width = steps[2].dtw + '%';
    pct.textContent = steps[2].dtw + '%';
  }, 1600);

  setTimeout(() => {
    setDot(4);
    status.textContent = steps[3].text;
    bar.style.width = '88%';
    pct.textContent = '88%';
    bar.style.background = '#1DB873';
  }, 2600);

  setTimeout(() => {
    result.style.display = 'block';
    result.style.borderColor = 'rgba(29,184,115,0.4)';
    result.style.background = 'rgba(29,184,115,0.08)';
    result.innerHTML = '<span style="color:#1DB873;font-weight:500">Gizli Panel Açıldı</span> · Dışarıdan gözlemleyen hiçbir iz göremedi';
    dot.style.opacity = '0';
    running = false;
    btn.disabled = false;
    btn.textContent = 'Tekrar Dene ↗';
  }, 3400);
}
</script>
